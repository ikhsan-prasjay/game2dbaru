<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Quest - Fullscreen Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Segoe+UI:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="hud-box">NYAWA: <span id="lives">❤️❤️❤️</span></div>
            <div class="hud-box" id="level-name">LEVEL 1</div>
            <div class="hud-box">SKOR: <span id="score">0</span></div>
        </div>

        <div id="main-menu" class="overlay active">
            <h1 style="font-size: 50px; color: #f1c40f; margin-bottom: 20px;">BRAIN QUEST</h1>
            <h2 style="margin-bottom: 40px;">Petualangan Pengetahuan!</h2>
            
            <button onclick="toggleFullScreen()" style="background-color: #2980b9; border-color: #1a5276; margin-bottom: 20px;">🖵 MODE LAYAR PENUH (F11)</button>
            <br>
            <button onclick="showLevelSelect()" style="transform: scale(1.1); padding: 20px 40px;">MULAI PETUALANGAN</button>
        </div>

        <div id="level-select" class="overlay">
            <h2 style="margin-bottom: 20px;">PILIH LEVEL</h2>
            <div id="levels-container"></div> 
            <button onclick="goMainMenu()" style="margin-top: 40px;">KEMBALI</button>
        </div>

        <div id="quiz-modal" class="overlay">
            <div class="quiz-box">
                <div id="quiz-question">Pertanyaan Kuis?</div>
                <div id="quiz-options"></div>
                <div id="quiz-feedback"></div>
                <button id="quiz-next-btn" onclick="resumeGame()" style="display:none;">LANJUTKAN</button>
            </div>
        </div>

        <div id="game-over" class="overlay">
            <h1 style="color: #e74c3c;">YAHH, GAME OVER!</h1>
            <h2>Skor Akhir: <span id="final-score">0</span></h2>
            <button onclick="showLevelSelect()">COBA LAGI</button>
        </div>

        <div id="level-complete" class="overlay">
            <h1 style="color: #2ecc71;">LEVEL SELESAI!</h1>
            <h2>Poin Didapat: <span id="level-score">0</span></h2>
            <button onclick="nextLevel()">LANJUT KE LEVEL BERIKUTNYA</button>
        </div>

        <div id="win-screen" class="overlay">
            <h1 style="color: #f1c40f;">SELAMAT! KAMU MENANG!</h1>
            <h2>Total Skor Seluruh Level: <span id="win-score">0</span></h2>
            <button onclick="goMainMenu()">KEMBALI KE MENU</button>
        </div>

        <div id="flash-overlay"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
